<svg width="128" height="128" viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
  <!--
    Synaptic Sentinel icon — alineado con la familia SYNAPTIC (SYNAPTIC Expert
    usa el mismo glifo de neurona + el mismo color galleryBanner #1a1a2e). El
    contorno tipo escudo es la diferencia visual de Sentinel (security).
  -->
  <rect width="128" height="128" fill="#1a1a2e"/>

  <!-- Marco tipo escudo (3 lados, signaling 'sentinel') -->
  <path d="M 24 28 L 24 88 L 64 108 L 104 88 L 104 28"
        fill="none" stroke="#6c7fbd" stroke-width="3" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- Glifo de neurona de la familia SYNAPTIC (4 nodos + 3 conectores) -->
  <g fill="#a8c5ff" stroke="#a8c5ff" stroke-linecap="round">
    <!-- nodo superior -->
    <circle cx="64" cy="40" r="6"/>
    <!-- nodo inferior izquierdo -->
    <circle cx="46" cy="82" r="6"/>
    <!-- nodo inferior derecho -->
    <circle cx="82" cy="82" r="6"/>
    <!-- nodo central (mas grande) -->
    <circle cx="64" cy="64" r="9"/>
    <!-- conector central -> superior -->
    <line x1="64" y1="46" x2="64" y2="55" stroke-width="3"/>
    <!-- conector central -> inferior izquierdo -->
    <line x1="58" y1="72" x2="51" y2="78" stroke-width="3"/>
    <!-- conector central -> inferior derecho -->
    <line x1="70" y1="72" x2="77" y2="78" stroke-width="3"/>
  </g>
</svg>
