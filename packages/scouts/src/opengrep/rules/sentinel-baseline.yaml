# SYNAPTIC Sentinel - ruleset baseline de OpenGrep.
#
# Catalogo curado de reglas SAST para los lenguajes LOCKED del MVP
# (JS/TS + Python). Combina reglas basadas en patrones sintacticos
# deterministas (high recall) y reglas de TAINT ANALYSIS (high precision:
# solo cuando datos no confiables fluyen a un sink peligroso).
#
# Cobertura (17 reglas):
#   - Pattern-based (11): ejecucion dinamica de codigo (CWE-95), inyeccion
#     de comandos del SO (CWE-78), Cross-Site Scripting (CWE-79),
#     deserializacion insegura (CWE-502), criptografia debil (CWE-327).
#   - Taint JS/TS (3): command injection (CWE-78), XSS via DOM (CWE-79),
#     SQL injection (CWE-89). Sources: req.body, req.query, etc.
#   - Taint Python (3): command injection (CWE-78), SQL injection (CWE-89),
#     path traversal (CWE-22). Sources: Flask (request.args/form/json/...),
#     Django (request.GET/POST/body), CLI/env (sys.argv, os.environ).
#   Cada regla taint declara `pattern-sources` (inputs no confiables) y
#   `pattern-sinks` (sinks peligrosos); reporta solo cuando un flujo
#   source->sink llega sin saneo.
#
# Historial:
#   - DG-043 (Cycle 36): 4 -> 11 reglas pattern-based.
#   - DG-049 (Cycle 42, FI-011 etapa 2): mensajes a ingles.
#   - DG-061 (Cycle 54, FI-003 etapa 1): 3 reglas taint para JS/TS.
#   - DG-062 (Cycle 55): drop del sink $DB.exec de sql-injection (FP vs
#     child_process.exec descubierto en la prueba del usuario).
#   - DG-063 (Cycle 56, FI-003 etapa 2): 3 reglas taint para Python (CIERRA FI-003).
#
# Licencia: Apache-2.0 (OSS).
rules:
  # --- JavaScript / TypeScript -------------------------------------------------

  - id: sentinel-js-eval-usage
    languages:
      - javascript
      - typescript
    severity: ERROR
    message: >-
      Use of eval(): executes arbitrary code at runtime. If the argument comes
      from an untrusted source this is a code injection.
    metadata:
      cwe:
        - "CWE-95: Improper Neutralization of Directives in Dynamically Evaluated Code"
      owasp:
        - "A03:2021 - Injection"
      category: security
    pattern: eval(...)

  - id: sentinel-js-new-function
    languages:
      - javascript
      - typescript
    severity: WARNING
    message: >-
      Use of "new Function()": builds code from strings at runtime, equivalent
      to eval().
    metadata:
      cwe:
        - "CWE-95: Improper Neutralization of Directives in Dynamically Evaluated Code"
      category: security
    pattern: new Function(...)

  - id: sentinel-js-settimeout-string
    languages:
      - javascript
      - typescript
    severity: ERROR
    message: >-
      A string as the first argument to setTimeout()/setInterval() is executed
      as code at runtime, equivalent to eval(). Pass a function instead.
    metadata:
      cwe:
        - "CWE-95: Improper Neutralization of Directives in Dynamically Evaluated Code"
      owasp:
        - "A03:2021 - Injection"
      category: security
    pattern-either:
      - pattern: setTimeout("...", ...)
      - pattern: setInterval("...", ...)

  - id: sentinel-js-document-write
    languages:
      - javascript
      - typescript
    severity: WARNING
    message: >-
      document.write()/writeln(): if the content comes from an untrusted source
      this enables Cross-Site Scripting (XSS).
    metadata:
      cwe:
        - "CWE-79: Improper Neutralization of Input During Web Page Generation"
      owasp:
        - "A03:2021 - Injection"
      category: security
    pattern-either:
      - pattern: document.write(...)
      - pattern: document.writeln(...)

  - id: sentinel-js-innerhtml-assignment
    languages:
      - javascript
      - typescript
    severity: WARNING
    message: >-
      Assignment to innerHTML with a dynamic value: if it comes from untrusted
      input this enables Cross-Site Scripting (XSS). Use textContent or
      sanitize the HTML.
    metadata:
      cwe:
        - "CWE-79: Improper Neutralization of Input During Web Page Generation"
      owasp:
        - "A03:2021 - Injection"
      category: security
    patterns:
      - pattern: $EL.innerHTML = $VAL
      - pattern-not: $EL.innerHTML = "..."

  # --- JavaScript / TypeScript: taint analysis (FI-003 etapa 1, DG-061) -------
  # Sources comunes a las 3 reglas: convencion Express (req.body, req.query,
  # req.params, req.headers, req.cookies) + process.argv / process.env (CLI).
  # XSS agrega ademas window.location y document.URL (browser-side).

  - id: sentinel-js-taint-command-injection
    languages:
      - javascript
      - typescript
    severity: ERROR
    mode: taint
    message: >-
      User-controlled data flows to a command-execution sink without
      sanitization (taint analysis). This is OS command injection: an
      attacker can inject shell commands via the source.
    metadata:
      cwe:
        - "CWE-78: Improper Neutralization of Special Elements used in an OS Command"
      owasp:
        - "A03:2021 - Injection"
      category: security
    pattern-sources:
      - pattern-either:
          - pattern: req.body
          - pattern: req.query
          - pattern: req.params
          - pattern: req.headers
          - pattern: req.cookies
          - pattern: request.body
          - pattern: request.query
          - pattern: request.params
          - pattern: process.argv
          - pattern: process.env
    pattern-sinks:
      - pattern-either:
          - pattern: exec($CMD, ...)
          - pattern: execSync($CMD, ...)
          - pattern: execFile($CMD, ...)
          - pattern: spawn($CMD, ...)
          - pattern: spawnSync($CMD, ...)

  - id: sentinel-js-taint-xss
    languages:
      - javascript
      - typescript
    severity: ERROR
    mode: taint
    message: >-
      User-controlled data flows to a DOM HTML sink without sanitization
      (taint analysis). This is Cross-Site Scripting (XSS): an attacker can
      inject HTML/JS via the source. Use textContent or sanitize the HTML.
    metadata:
      cwe:
        - "CWE-79: Improper Neutralization of Input During Web Page Generation"
      owasp:
        - "A03:2021 - Injection"
      category: security
    pattern-sources:
      - pattern-either:
          - pattern: req.body
          - pattern: req.query
          - pattern: req.params
          - pattern: req.headers
          - pattern: request.body
          - pattern: request.query
          - pattern: window.location.search
          - pattern: window.location.hash
          - pattern: document.URL
          - pattern: document.referrer
    pattern-sinks:
      - pattern-either:
          - pattern: $EL.innerHTML = $X
          - pattern: $EL.outerHTML = $X
          - pattern: document.write($X)
          - pattern: document.writeln($X)
    pattern-sanitizers:
      - pattern-either:
          - pattern: DOMPurify.sanitize(...)
          - pattern: escapeHtml(...)
          - pattern: sanitizeHtml(...)

  - id: sentinel-js-taint-sql-injection
    languages:
      - javascript
      - typescript
    severity: ERROR
    mode: taint
    message: >-
      User-controlled data flows to a SQL execution sink as part of a string
      (taint analysis). This is SQL injection. Use parameterized queries
      (placeholders + a values array) instead of building the SQL by
      concatenation or template literals.
    metadata:
      cwe:
        - "CWE-89: Improper Neutralization of Special Elements used in an SQL Command"
      owasp:
        - "A03:2021 - Injection"
      category: security
    # Sinks intencionalmente acotados a metodos especificos de drivers SQL:
    # `query`, `execute`, `raw`. NO incluimos `$DB.exec($SQL, ...)` aunque
    # algunos drivers (sqlite3) lo expongan: OpenGrep matchea `child_process`'s
    # destructured `exec(...)` contra `$DB.exec(...)` y genera un falso positivo
    # (descubierto al probar el .vsix tras DG-061; el sqlite3 driver es minoria
    # frente a la colision con child_process). DG-062 B.
    pattern-sources:
      - pattern-either:
          - pattern: req.body
          - pattern: req.query
          - pattern: req.params
          - pattern: req.headers
          - pattern: request.body
          - pattern: request.query
          - pattern: request.params
    pattern-sinks:
      - pattern-either:
          - pattern: $DB.query($SQL, ...)
          - pattern: $DB.execute($SQL, ...)
          - pattern: $KNEX.raw($SQL, ...)

  # --- Python ------------------------------------------------------------------

  - id: sentinel-py-exec-usage
    languages:
      - python
    severity: ERROR
    message: "Use of exec(): executes arbitrary Python code at runtime."
    metadata:
      cwe:
        - "CWE-95: Improper Neutralization of Directives in Dynamically Evaluated Code"
      owasp:
        - "A03:2021 - Injection"
      category: security
    pattern: exec(...)

  - id: sentinel-py-subprocess-shell
    languages:
      - python
    severity: ERROR
    message: >-
      subprocess with shell=True: if any argument comes from untrusted input
      this enables OS command injection.
    metadata:
      cwe:
        - "CWE-78: Improper Neutralization of Special Elements used in an OS Command"
      owasp:
        - "A03:2021 - Injection"
      category: security
    pattern: subprocess.$FUNC(..., shell=True, ...)

  - id: sentinel-py-os-system
    languages:
      - python
    severity: ERROR
    message: >-
      os.system() runs its argument in a system shell: if it comes from
      untrusted input this enables OS command injection.
    metadata:
      cwe:
        - "CWE-78: Improper Neutralization of Special Elements used in an OS Command"
      owasp:
        - "A03:2021 - Injection"
      category: security
    pattern: os.system(...)

  - id: sentinel-py-yaml-load
    languages:
      - python
    severity: ERROR
    message: >-
      yaml.load() without a SafeLoader can instantiate arbitrary objects from
      the YAML document: unsafe deserialization. Use yaml.safe_load().
    metadata:
      cwe:
        - "CWE-502: Deserialization of Untrusted Data"
      owasp:
        - "A08:2021 - Software and Data Integrity Failures"
      category: security
    patterns:
      - pattern: yaml.load(...)
      - pattern-not: yaml.load(..., Loader=yaml.SafeLoader)
      - pattern-not: yaml.load(..., Loader=yaml.CSafeLoader)

  - id: sentinel-py-pickle-load
    languages:
      - python
    severity: ERROR
    message: >-
      pickle.load()/loads() can execute arbitrary code during deserialization:
      do not use it on data that is not fully trusted.
    metadata:
      cwe:
        - "CWE-502: Deserialization of Untrusted Data"
      owasp:
        - "A08:2021 - Software and Data Integrity Failures"
      category: security
    pattern-either:
      - pattern: pickle.load(...)
      - pattern: pickle.loads(...)

  - id: sentinel-py-md5-usage
    languages:
      - python
    severity: WARNING
    message: >-
      hashlib.md5() is a cryptographically weak hash algorithm: do not use it
      for passwords, signatures or integrity checks. Prefer SHA-256.
    metadata:
      cwe:
        - "CWE-327: Use of a Broken or Risky Cryptographic Algorithm"
      owasp:
        - "A02:2021 - Cryptographic Failures"
      category: security
    pattern: hashlib.md5(...)

  # --- Python: taint analysis (FI-003 etapa 2, DG-063) ------------------------
  # Sources comunes a las 3 reglas: convencion Flask (request.args, .form,
  # .json, .values, .headers, .cookies), Django (request.GET, .POST, .body),
  # CLI/env (sys.argv, os.environ). Estos son los puntos clasicos por donde
  # entra input no confiable en aplicaciones Python.

  - id: sentinel-py-taint-command-injection
    languages:
      - python
    severity: ERROR
    mode: taint
    message: >-
      User-controlled data flows to a command-execution sink without
      sanitization (taint analysis). This is OS command injection: an
      attacker can inject shell commands via the source.
    metadata:
      cwe:
        - "CWE-78: Improper Neutralization of Special Elements used in an OS Command"
      owasp:
        - "A03:2021 - Injection"
      category: security
    pattern-sources:
      - pattern-either:
          - pattern: request.args
          - pattern: request.form
          - pattern: request.json
          - pattern: request.values
          - pattern: request.headers
          - pattern: request.cookies
          - pattern: request.GET
          - pattern: request.POST
          - pattern: request.body
          - pattern: sys.argv
          - pattern: os.environ
    pattern-sinks:
      - pattern-either:
          - pattern: subprocess.run($CMD, ...)
          - pattern: subprocess.call($CMD, ...)
          - pattern: subprocess.check_call($CMD, ...)
          - pattern: subprocess.check_output($CMD, ...)
          - pattern: subprocess.Popen($CMD, ...)
          - pattern: os.system($CMD)
          - pattern: os.popen($CMD)

  - id: sentinel-py-taint-sql-injection
    languages:
      - python
    severity: ERROR
    mode: taint
    message: >-
      User-controlled data flows to a SQL execution sink as part of a string
      (taint analysis). This is SQL injection. Use parameterized queries
      (placeholders + parameters) instead of building the SQL by string
      concatenation or f-strings.
    metadata:
      cwe:
        - "CWE-89: Improper Neutralization of Special Elements used in an SQL Command"
      owasp:
        - "A03:2021 - Injection"
      category: security
    pattern-sources:
      - pattern-either:
          - pattern: request.args
          - pattern: request.form
          - pattern: request.json
          - pattern: request.values
          - pattern: request.GET
          - pattern: request.POST
          - pattern: sys.argv
          - pattern: os.environ
    pattern-sinks:
      - pattern-either:
          - pattern: $CURSOR.execute($SQL, ...)
          - pattern: $CURSOR.executemany($SQL, ...)
          - pattern: $CURSOR.executescript($SQL, ...)

  - id: sentinel-py-taint-path-traversal
    languages:
      - python
    severity: ERROR
    mode: taint
    message: >-
      User-controlled data flows to a file path sink without sanitization
      (taint analysis). This is path traversal (CWE-22): an attacker can
      escape the intended directory with `../` segments. Sanitize with
      werkzeug.utils.secure_filename() or os.path.basename().
    metadata:
      cwe:
        - "CWE-22: Improper Limitation of a Pathname to a Restricted Directory ('Path Traversal')"
      owasp:
        - "A01:2021 - Broken Access Control"
      category: security
    pattern-sources:
      - pattern-either:
          - pattern: request.args
          - pattern: request.form
          - pattern: request.json
          - pattern: request.values
          - pattern: request.GET
          - pattern: request.POST
          - pattern: sys.argv
    pattern-sinks:
      - pattern-either:
          - pattern: open($PATH, ...)
          - pattern: pathlib.Path($PATH)
          - pattern: os.remove($PATH)
          - pattern: os.unlink($PATH)
          - pattern: shutil.rmtree($PATH)
          - pattern: shutil.copy($SRC, $PATH)
    pattern-sanitizers:
      - pattern-either:
          - pattern: secure_filename(...)
          - pattern: werkzeug.utils.secure_filename(...)
          - pattern: os.path.basename(...)
